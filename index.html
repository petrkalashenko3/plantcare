<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantata — помощник по уходу за растениями</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header__logo">🌿 Plantata</h1>
      <p class="header__subtitle">Помощник по уходу за комнатными растениями</p>
    </header>

    <!-- Навигация по разделам. Кнопки переключают вкладки через data-tab. -->
    <nav class="nav">
      <button class="nav__btn" data-tab="catalog">Справочник</button>
      <button class="nav__btn" data-tab="my-plants">Мои растения<span id="care-badge" class="nav__badge" hidden></span></button>
      <button class="nav__btn" data-tab="favorites">Избранное</button>
    </nav>

    <main class="container">
      <!-- Раздел «Справочник» -->
      <section id="tab-catalog" class="tab">
        <div id="catalog-list"></div>
      </section>

      <!-- Раздел «Мои растения» (личная коллекция) -->
      <section id="tab-my-plants" class="tab" hidden>
        <div class="myplants-header">
          <button id="enable-notifications" class="btn">🔔 Напоминать в браузере</button>
        </div>
        <div id="reminders-banner"></div>
        <div id="my-plants-list"></div>
      </section>

      <!-- Раздел «Избранное» -->
      <section id="tab-favorites" class="tab" hidden>
        <div id="favorites-list"></div>
      </section>
    </main>

    <!-- Модальное окно с детальной карточкой растения -->
    <div id="plant-modal" class="modal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__box" role="dialog" aria-modal="true">
        <button class="modal__close" data-close aria-label="Закрыть">×</button>
        <div id="plant-modal-body"></div>
      </div>
    </div>

    <!-- Модальное окно с формой добавления/редактирования растения коллекции -->
    <div id="myplant-modal" class="modal" hidden>
      <div class="modal__backdrop" data-close-form></div>
      <div class="modal__box" role="dialog" aria-modal="true">
        <button class="modal__close" data-close-form aria-label="Закрыть">×</button>
        <h2 id="myplant-form-title" class="details__title">В мои растения</h2>
        <form id="myplant-form" class="form">
          <p id="myplant-form-linked" class="form__linked"></p>

          <label class="form__field">
            <span>Своё название (необязательно)</span>
            <input type="text" name="customName" placeholder="Например, Монстера на кухне" />
          </label>

          <label class="form__field">
            <span>Когда завели растение</span>
            <input type="date" name="addedDate" required />
          </label>

          <label class="form__field">
            <span>Последний полив</span>
            <input type="date" name="lastWateredDate" required />
          </label>

          <label class="form__field">
            <span>Поливать каждые (дней)</span>
            <input type="number" name="wateringIntervalDays" min="1" value="7" required />
          </label>

          <label class="form__field">
            <span>Заметки</span>
            <textarea name="notes" rows="3" placeholder="Стоит на южном окне, летом чаще опрыскиваю..."></textarea>
          </label>

          <div class="form__actions">
            <button type="submit" class="btn btn--primary">Сохранить</button>
            <button type="button" class="btn" data-close-form>Отмена</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/plant-details.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/my-plants.js"></script>
    <script src="js/reminders.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
